name: Update

on:
  watch:
    types: [started]
  schedule:
    # 每 4 小时全网清洗一次，确保存活率，彻底告别 -1
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2

    - name: Setup Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install requests pyyaml

    - name: ⚡ 运行高存活率节点聚合清洗引擎
      run: |
        python execute.py

    - name: Git push
      run: |
        git config --local user.name "GitHub Action"
        git config --local user.email "action@github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自动构建：更换高质量活节点源，优化 V2RayN 兼容配置"
        git push
