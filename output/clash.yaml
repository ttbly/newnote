port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
mixed-port: 7893
proxies:
- name: 🌐 🚀 节点池无可用活节点
  type: ss
  server: 127.0.0.1
  port: 8388
  cipher: aes-256-gcm
  password: test
proxy-groups:
- name: 🚀 🛑 代理节点全局代理
  type: select
  proxies:
  - 🔮 自动选择
  - 🤖 OpenAI/Claude 专用
  - 🌐 🚀 节点池无可用活节点
- name: 🔮 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
  - 🌐 🚀 节点池无可用活节点
- name: 🤖 OpenAI/Claude 专用
  type: select
  proxies:
  - 🌐 🚀 节点池无可用活节点
  - 🚀 🛑 代理节点全局代理
- name: ⚓ 漏网之鱼(国内直连)
  type: select
  proxies:
  - DIRECT
  - 🚀 🛑 代理节点全局代理
rules:
- DOMAIN-SUFFIX,openai.com,🤖 OpenAI/Claude 专用
- DOMAIN-SUFFIX,chatgpt.com,🤖 OpenAI/Claude 专用
- DOMAIN-SUFFIX,oaistatic.com,🤖 OpenAI/Claude 专用
- DOMAIN-SUFFIX,oaiusercontent.com,🤖 OpenAI/Claude 专用
- DOMAIN-KEYWORD,openai,🤖 OpenAI/Claude 专用
- DOMAIN-SUFFIX,anthropic.com,🤖 OpenAI/Claude 专用
- DOMAIN-SUFFIX,claude.ai,🤖 OpenAI/Claude 专用
- DOMAIN-KEYWORD,claude,🤖 OpenAI/Claude 专用
- GEOIP,CN,DIRECT
- MATCH,⚓ 漏网之鱼(国内直连)
